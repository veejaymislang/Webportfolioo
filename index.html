<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modern Portfolio</title>
  <style>
    /* Cinematic splash styles */
    #splash-screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, rgba(2, 6, 23, 0.98), rgba(5, 5, 10, 0.98));
      color: #ffffff;
      z-index: 1200;
      overflow: hidden;
    }

    #splash-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.6s ease, visibility 0.6s ease;
      display: none !important;
    }

    .splash-content {
      text-align: center;
      max-width: 820px;
      padding: 2rem;
    }

    .splash-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    #splash-logo {
      width: 140px;
      height: 140px;
      display: block;
    }

    /* center logo styles */
    #splash-logo {
      width: clamp(96px, 18vw, 220px);
      height: auto;
      display: block;
      margin: 6vh auto 0;
      transform-origin: center;
      will-change: transform, filter, opacity;
    }

    /* keep subtle background shapes behavior */
    .splash-title,
    .splash-icons,
    .splash-subtitle,
    .subtitle-underline {
      display: none;
    }

    #site-footer {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      opacity: 0;
      color: rgba(255, 255, 255, 0.85);
      font-weight: 700;
      letter-spacing: 0.6px;
      font-size: 13px;
      z-index: 1100;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <!-- Interactive Technical Particle Canvas -->
  <canvas id="particle-canvas"></canvas>
  
  <!-- Splash Screen - HIDDEN -->
  <div id="splash-screen" class="hidden" style="display: none !important;"></div>

    <div class="splash-content">
      <div class="splash-center">
        <!-- Centered SVG logo: refined multi-stroke mark for better presence -->
        <svg id="splash-logo" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" role="img"
          preserveAspectRatio="xMidYMid meet">
          <defs>
            <linearGradient id="g1" x1="0" x2="1" y1="0" y2="1">
              <stop offset="0%" stop-color="#00f0ff" />
              <stop offset="55%" stop-color="#0fd3ff" />
              <stop offset="100%" stop-color="#7b5cff" />
            </linearGradient>
            <linearGradient id="g2" x1="0" x2="1">
              <stop offset="0%" stop-color="#6af6ff" stop-opacity="0.78" />
              <stop offset="100%" stop-color="#b48bff" stop-opacity="0.78" />
            </linearGradient>
          </defs>

          <!-- outer ring -->
          <circle cx="60" cy="60" r="52" fill="none" stroke="url(#g1)" stroke-width="5" stroke-linecap="round"
            stroke-linejoin="round" />

          <!-- layered broken inner ring for a premium draw -->
          <path d="M60 8 A52 52 0 0 1 112 60" fill="none" stroke="url(#g2)" stroke-width="3" stroke-linecap="round" />
          <path d="M60 112 A52 52 0 0 1 8 60" fill="none" stroke="url(#g2)" stroke-width="3" stroke-linecap="round" />

          <!-- stylized portal / monogram: rounded inverted-U -->
          <path d="M36 76 V44 a6 6 0 0 1 6 -6 h36 a6 6 0 0 1 6 6 v32" fill="none" stroke="url(#g1)" stroke-width="6"
            stroke-linecap="round" stroke-linejoin="round" />

          <!-- subtle inner bar accent -->
          <path d="M44 84 H76" fill="none" stroke="url(#g2)" stroke-width="2.5" stroke-linecap="round" />

          <!-- small sparkle for personality -->
          <circle cx="92" cy="34" r="2.2" fill="none" stroke="url(#g1)" stroke-width="2.6" stroke-linecap="round" />
        </svg>
      </div>
    </div>
    <!-- bottom splash name removed (name shown centrally during splash) -->
  </div>

  <!-- Custom Cursor -->
  <div id="custom-cursor"></div>
  <div id="custom-cursor-blob"></div>

  <div id="app"></div>
  <footer id="site-footer" aria-hidden="true">
    <div class="site-footer-inner"></div>
  </footer>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
